<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>9921ops</title>

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ========================================
       HERO SECTION
       ======================================== -->
  <header class="hero">

    <!-- Editable text-based logo -->
    <div class="logo">
      <span class="logo-white">99</span><span class="logo-purple">21</span>

      <div class="logo-sub">
        OPS
      </div>
    </div>

    <!-- Brand tagline -->
    <p class="tagline">
      Systems. Tools. Insights. Results.
    </p>

    <!-- Hero call-to-action buttons -->
    <div class="hero-buttons">

      <a href="#" class="primary-button">
        Explore
      </a>

      <a href="#" class="secondary-button">
        Projects
      </a>

    </div>

<!-- ========================================
     Orbital Spherical Carousel
     ======================================== -->

<div class="carousel-placeholder">

  <!-- Back / 12 PM -->
  <div class="carousel-card orbit-card back-card pos-back">
    <img src="images/photo1.jpg" alt="Gallery image">
  </div>

  <!-- Back Left -->
  <div class="carousel-card orbit-card far-left-card pos-far-left">
    <img src="images/photo2.jpg" alt="Gallery image">
  </div>

  <!-- Left -->
  <div class="carousel-card orbit-card left-card pos-left">
    <img src="images/photo3.jpg" alt="Gallery image">
  </div>

  <!-- Center / Front / 6 PM -->
  <div class="carousel-card orbit-card center-card pos-front">

    <img src="images/photo4.jpg" alt="Gallery image">

  </div>

  <!-- Right -->
  <div class="carousel-card orbit-card right-card pos-right">
    <img src="images/photo5.jpg" alt="Gallery image">
  </div>

  <!-- Back Right -->
  <div class="carousel-card orbit-card far-right-card pos-far-right">
    <img src="images/photo6.jpg" alt="Gallery image">
  </div>

  <!-- Transition / Deep Orbit -->
  <!-- <div class="carousel-card orbit-card deep-card pos-deep">
    <img src="images/photo7.jpg" alt="Gallery image">
  </div> -->


  
    <button class="carousel-zone zone-left" aria-label="Move carousel left">
      ‹
    </button>

    <button class="carousel-zone zone-right" aria-label="Move carousel right">
      ›
    </button>

</div>

  </header>

  <!-- Main JavaScript -->
  <script src="script.js"></script>

</body>
</html>
